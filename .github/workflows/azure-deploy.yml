name: Deploy ClaimSense to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push Backend image
      run: |
        docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-backend:${{ github.sha }} -f ./backend/Dockerfile ./backend
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-backend:${{ github.sha }}

    - name: Build and push Frontend image
      run: |
        docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-frontend:${{ github.sha }} -f ./frontend/Dockerfile.frontend ./frontend
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-frontend:${{ github.sha }}
        
    - name: Deploy to Azure Web Apps (Backend)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'claim-sense-backend'
        publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-backend:${{ github.sha }}'

    - name: Deploy to Azure Web Apps (Frontend)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'claim-sense-frontend'
        publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
        images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/claim-frontend:${{ github.sha }}'
